# nginx site config for bitcoin-node-scanner.
#
# Single-origin reverse proxy:
#   /api/  → FastAPI (127.0.0.1:8000)
#   /      → Next.js (127.0.0.1:3000)
#
# Browsers see both UI and API on the same origin, so no CORS preflight is
# needed in production. See openspec change deploy-frontend-ci, design D3.
#
# Install: symlink to /etc/nginx/sites-enabled/bitcoin-scanner.
# Replace `server_name _` with the public hostname once DNS/TLS are ready.
# This config is HTTP-only; TLS termination is out of scope for this change.

upstream bitcoin_scanner_api {
    server 127.0.0.1:8000;
    keepalive 16;
}

upstream bitcoin_scanner_frontend {
    server 127.0.0.1:3000;
    keepalive 16;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    client_max_body_size 1m;

    # Gzip is fine; brotli would need the optional module.
    gzip on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript application/xml+rss text/xml application/x-javascript text/javascript;

    # FastAPI backend.
    location /api/ {
        proxy_pass http://bitcoin_scanner_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        # Streaming endpoints (e.g. /api/v1/scans/{job_id}/events) need buffering off.
        proxy_buffering off;
        proxy_read_timeout 300s;
    }

    # Next.js dashboard. Static assets under /_next/static are immutable.
    location /_next/static/ {
        proxy_pass http://bitcoin_scanner_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://bitcoin_scanner_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
    }
}
