<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bitcoin Node Scanner</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; }
    header { background: #1a1d27; border-bottom: 1px solid #2d3148; padding: 1rem 2rem; display: flex; align-items: center; gap: 1rem; }
    header h1 { font-size: 1.25rem; font-weight: 600; color: #f97316; }
    header span { font-size: 0.8rem; color: #64748b; }
    main { max-width: 1400px; margin: 0 auto; padding: 1.5rem 2rem; }

    /* Stats cards */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
    .card { background: #1a1d27; border: 1px solid #2d3148; border-radius: 8px; padding: 1rem; }
    .card .label { font-size: 0.75rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.4rem; }
    .card .value { font-size: 1.75rem; font-weight: 700; }
    .card.critical .value { color: #ef4444; }
    .card.high .value    { color: #f97316; }
    .card.medium .value  { color: #eab308; }
    .card.low .value     { color: #22c55e; }
    .card.total .value   { color: #60a5fa; }

    /* Toolbar */
    .toolbar { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap; }
    .toolbar select, .toolbar button { padding: 0.4rem 0.8rem; border-radius: 6px; border: 1px solid #2d3148; background: #1a1d27; color: #e2e8f0; font-size: 0.875rem; cursor: pointer; }
    .toolbar button { background: #1d4ed8; border-color: #1d4ed8; font-weight: 600; }
    .toolbar button:disabled { opacity: 0.5; cursor: not-allowed; }
    #scan-status { font-size: 0.8rem; color: #94a3b8; }
    #scan-status.running { color: #f97316; }
    #scan-status.completed { color: #22c55e; }
    #scan-status.failed { color: #ef4444; }

    /* Table */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    th { background: #1a1d27; color: #94a3b8; font-weight: 500; text-align: left; padding: 0.6rem 0.8rem; border-bottom: 1px solid #2d3148; white-space: nowrap; cursor: pointer; user-select: none; }
    th:hover { color: #e2e8f0; }
    th.sort-active { color: #60a5fa; }
    .sort-hint { font-size: 0.7rem; margin-left: 0.25rem; opacity: 0.4; }
    th.sort-active .sort-hint { opacity: 1; color: #60a5fa; }
    td { padding: 0.55rem 0.8rem; border-bottom: 1px solid #1e2130; }
    tr:hover td { background: #1a1d27; }
    .badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 4px; font-size: 0.75rem; font-weight: 600; }
    .badge-CRITICAL { background: #7f1d1d; color: #fca5a5; }
    .badge-HIGH     { background: #7c2d12; color: #fdba74; }
    .badge-MEDIUM   { background: #713f12; color: #fde68a; }
    .badge-LOW      { background: #14532d; color: #86efac; }
    .badge-UNKNOWN  { background: #1e293b; color: #94a3b8; }

    /* Pagination */
    .pagination { display: flex; gap: 0.5rem; margin-top: 1rem; align-items: center; font-size: 0.875rem; color: #94a3b8; }
    .pagination button { padding: 0.3rem 0.7rem; border-radius: 5px; border: 1px solid #2d3148; background: #1a1d27; color: #e2e8f0; cursor: pointer; }
    .pagination button:disabled { opacity: 0.4; cursor: default; }

    /* Last updated */
    #last-updated { font-size: 0.75rem; color: #475569; margin-top: 0.5rem; }
  </style>
</head>
<body>
<header>
  <h1>&#x20BF; Bitcoin Node Scanner</h1>
  <span id="last-scan-at">Last scan: —</span>
</header>
<main>
  <!-- Stats -->
  <div class="stats-grid">
    <div class="card total"><div class="label">Total Nodes</div><div class="value" id="stat-total">—</div></div>
    <div class="card critical"><div class="label">Critical</div><div class="value" id="stat-critical">—</div></div>
    <div class="card high"><div class="label">High</div><div class="value" id="stat-high">—</div></div>
    <div class="card medium"><div class="label">Medium</div><div class="value" id="stat-medium">—</div></div>
    <div class="card low"><div class="label">Low</div><div class="value" id="stat-low">—</div></div>
    <div class="card"><div class="label">Vulnerable</div><div class="value" id="stat-vulnerable" style="color:#a78bfa">—</div></div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <select id="risk-filter">
      <option value="">All Risk Levels</option>
      <option value="CRITICAL">Critical</option>
      <option value="HIGH">High</option>
      <option value="MEDIUM">Medium</option>
      <option value="LOW">Low</option>
    </select>
    <select id="country-filter">
      <option value="">All Countries</option>
    </select>
    <button id="scan-btn" onclick="triggerScan()">&#9654; Start Scan</button>
    <span id="scan-status"></span>
  </div>

  <!-- Node Table -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr id="table-head">
          <th data-col="ip">IP<span class="sort-hint">⇅</span></th>
          <th data-col="port">Port<span class="sort-hint">⇅</span></th>
          <th data-col="version">Version<span class="sort-hint">⇅</span></th>
          <th data-col="risk_level">Risk Level<span class="sort-hint">⇅</span></th>
          <th data-col="country_name">Server Location<span class="sort-hint">⇅</span></th>
          <th data-col="geo_country_name">IP Registry<span class="sort-hint">⇅</span></th>
          <th data-col="last_seen" class="sort-active">Last Seen<span class="sort-hint">▼</span></th>
        </tr>
      </thead>
      <tbody id="node-tbody">
        <tr><td colspan="7" style="text-align:center;color:#64748b;padding:2rem">Loading…</td></tr>
      </tbody>
    </table>
  </div>

  <!-- Pagination -->
  <div class="pagination">
    <button id="prev-btn" onclick="changePage(-1)" disabled>&#8249; Prev</button>
    <span id="page-info">Page 1</span>
    <button id="next-btn" onclick="changePage(1)">Next &#8250;</button>
  </div>

  <div id="last-updated"></div>
  <p style="margin-top:2rem;font-size:0.7rem;color:#334155">
    This product includes GeoLite2 data created by MaxMind, available from
    <a href="https://www.maxmind.com" style="color:#475569">maxmind.com</a>.
  </p>
</main>

<script>
  const API_KEY = prompt("Enter API key:") || "";
  const PAGE_SIZE = 50;

  let currentPage = 0;
  let currentFilter = "";
  let currentCountry = "";
  let sortBy = "last_seen";
  let sortDir = "desc";
  let activeScanJobId = null;
  let scanPollInterval = null;

  const headers = { "X-API-Key": API_KEY };

  // ── Sort headers ────────────────────────────────────────────────────────────
  function updateSortHeaders() {
    document.querySelectorAll("#table-head th").forEach(th => {
      const col = th.dataset.col;
      const hint = th.querySelector(".sort-hint");
      if (col === sortBy) {
        th.classList.add("sort-active");
        hint.textContent = sortDir === "asc" ? "▲" : "▼";
      } else {
        th.classList.remove("sort-active");
        hint.textContent = "⇅";
      }
    });
  }

  document.querySelectorAll("#table-head th").forEach(th => {
    th.addEventListener("click", () => {
      const col = th.dataset.col;
      if (sortBy === col) {
        sortDir = sortDir === "asc" ? "desc" : "asc";
      } else {
        sortBy = col;
        sortDir = "desc";
      }
      currentPage = 0;
      updateSortHeaders();
      fetchNodes();
    });
  });

  // ── Stats ───────────────────────────────────────────────────────────────────
  async function fetchStats() {
    try {
      const r = await fetch("/api/v1/stats", { headers });
      if (!r.ok) return;
      const d = await r.json();
      document.getElementById("stat-total").textContent = d.total_nodes ?? "—";
      document.getElementById("stat-critical").textContent = d.by_risk_level?.CRITICAL ?? 0;
      document.getElementById("stat-high").textContent = d.by_risk_level?.HIGH ?? 0;
      document.getElementById("stat-medium").textContent = d.by_risk_level?.MEDIUM ?? 0;
      document.getElementById("stat-low").textContent = d.by_risk_level?.LOW ?? 0;
      document.getElementById("stat-vulnerable").textContent = d.vulnerable_nodes_count ?? 0;
      document.getElementById("last-scan-at").textContent =
        d.last_scan_at ? "Last scan: " + new Date(d.last_scan_at).toLocaleString() : "Last scan: —";
    } catch (e) { /* ignore */ }
  }

  // ── Countries dropdown ──────────────────────────────────────────────────────
  async function fetchCountries() {
    try {
      const r = await fetch("/api/v1/nodes/countries", { headers });
      if (!r.ok) return;
      const countries = await r.json();
      const sel = document.getElementById("country-filter");
      countries.forEach(c => {
        const opt = document.createElement("option");
        opt.value = c;
        opt.textContent = c;
        sel.appendChild(opt);
      });
    } catch (e) { /* ignore */ }
  }

  document.getElementById("country-filter").addEventListener("change", e => {
    currentCountry = e.target.value;
    currentPage = 0;
    fetchNodes();
  });

  // ── Nodes ───────────────────────────────────────────────────────────────────
  async function fetchNodes() {
    const offset = currentPage * PAGE_SIZE;
    const qs = new URLSearchParams({ limit: PAGE_SIZE, offset, sort_by: sortBy, sort_dir: sortDir });
    if (currentFilter) qs.set("risk_level", currentFilter);
    if (currentCountry) qs.set("country", currentCountry);

    const tbody = document.getElementById("node-tbody");
    tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;color:#64748b;padding:2rem">Loading…</td></tr>`;

    try {
      const r = await fetch("/api/v1/nodes?" + qs, { headers });
      if (!r.ok) { tbody.innerHTML = `<tr><td colspan="7" style="color:#ef4444;padding:1rem">Error: ${r.status}</td></tr>`; return; }
      const nodes = await r.json();

      if (nodes.length === 0) {
        tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;color:#64748b;padding:2rem">No nodes found.</td></tr>`;
      } else {
        tbody.innerHTML = nodes.map(n => {
          const shodan = n.country_name ?? n.country_code ?? "—";
          const maxmind = n.geo_country_name ?? n.geo_country_code ?? "—";
          const mismatch = n.country_name && n.geo_country_name && n.country_name !== n.geo_country_name;
          return `
          <tr>
            <td style="font-family:monospace">${n.ip}</td>
            <td>${n.port}</td>
            <td style="font-family:monospace;font-size:0.8rem">${n.version ?? "—"}</td>
            <td><span class="badge badge-${n.risk_level ?? "UNKNOWN"}">${n.risk_level ?? "Unknown"}</span></td>
            <td>${shodan}</td>
            <td style="${mismatch ? "color:#f97316" : ""}">${maxmind}</td>
            <td style="color:#64748b;font-size:0.8rem">${n.last_seen ? new Date(n.last_seen).toLocaleString() : "—"}</td>
          </tr>`;
        }).join("");
      }

      document.getElementById("prev-btn").disabled = currentPage === 0;
      document.getElementById("next-btn").disabled = nodes.length < PAGE_SIZE;
      document.getElementById("page-info").textContent = "Page " + (currentPage + 1);
      document.getElementById("last-updated").textContent = "Updated: " + new Date().toLocaleTimeString();
    } catch (e) {
      tbody.innerHTML = `<tr><td colspan="7" style="color:#ef4444;padding:1rem">Network error</td></tr>`;
    }
  }

  function changePage(delta) {
    currentPage = Math.max(0, currentPage + delta);
    fetchNodes();
  }

  document.getElementById("risk-filter").addEventListener("change", e => {
    currentFilter = e.target.value;
    currentPage = 0;
    fetchNodes();
  });

  // ── Scan trigger ────────────────────────────────────────────────────────────
  async function triggerScan() {
    const btn = document.getElementById("scan-btn");
    btn.disabled = true;
    setScanStatus("Starting scan…", "");
    try {
      const r = await fetch("/api/v1/scans", { method: "POST", headers });
      if (r.status === 409) {
        setScanStatus("Scan already running", "running");
        btn.disabled = true;
        return;
      }
      if (!r.ok) { setScanStatus("Failed to start scan (" + r.status + ")", "failed"); btn.disabled = false; return; }
      const d = await r.json();
      activeScanJobId = d.job_id;
      setScanStatus("Scan running…", "running");
      startScanPolling();
    } catch (e) {
      setScanStatus("Network error", "failed");
      btn.disabled = false;
    }
  }

  function setScanStatus(text, cls) {
    const el = document.getElementById("scan-status");
    el.textContent = text;
    el.className = cls;
  }

  function startScanPolling() {
    if (scanPollInterval) clearInterval(scanPollInterval);
    scanPollInterval = setInterval(pollScanJob, 10000);
  }

  async function pollScanJob() {
    if (!activeScanJobId) return;
    try {
      const r = await fetch("/api/v1/scans/" + activeScanJobId, { headers });
      if (!r.ok) return;
      const d = await r.json();
      if (d.status === "completed") {
        clearInterval(scanPollInterval);
        setScanStatus("Scan completed ✓", "completed");
        document.getElementById("scan-btn").disabled = false;
        activeScanJobId = null;
        fetchStats();
        fetchNodes();
      } else if (d.status === "failed") {
        clearInterval(scanPollInterval);
        const msg = d.result_summary?.error ?? "unknown error";
        setScanStatus("Scan failed: " + msg, "failed");
        document.getElementById("scan-btn").disabled = false;
        activeScanJobId = null;
      }
    } catch (e) { /* ignore */ }
  }

  // ── Init ────────────────────────────────────────────────────────────────────
  updateSortHeaders();
  fetchStats();
  fetchCountries();
  fetchNodes();
  setInterval(fetchStats, 30000);
</script>
</body>
</html>
